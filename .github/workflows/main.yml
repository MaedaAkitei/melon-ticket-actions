name: Melon Ticket Alert (Robust Email)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-ticket:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # 尝试利用插件发送失败来报错
      - name: Check Tickets (With Invalid Webhook)
        id: check_step
        continue-on-error: true # 即使这一步报错，也继续往下走，让我们有机会处理
        uses: mooyoul/melon-ticket-actions@v1.1.0
        with:
          product-id: 212765     # 👈 修改这里
          schedule-id: 100001      # 👈 修改这里
          seat-id: 1_0             
          # 故意给一个无效的 Webhook，如果插件在有票时尝试发送，可能会报错
          slack-incoming-webhook-url: 'https://invalid-url-for-testing.com/fake'
          message: 'Ticket Found!'

      # 如果上一步因为发送失败而报错了 (outcome == 'failure')，说明可能有票！
      - name: Trigger Alert If Plugin Failed
        if: steps.check_step.outcome == 'failure'
        run: |
          echo "🚨 插件运行失败（可能是因为有票且无法发送 Slack）！"
          echo "🚨 判定为：有票！"
          exit 1 # 再次报错，确保 GitHub 发邮件

      # 如果上一步成功了 (outcome == 'success')，说明没票，或者插件没尝试发送
      - name: Success Log
        if: steps.check_step.outcome == 'success'
        run: |
          echo "😭 插件运行成功，推测暂无余票。"
          exit 0
